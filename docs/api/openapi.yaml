openapi: 3.0.3
info:
  title: Library System API
  description: "REST API для системи обліку книг бібліотеки з пошуком, бронюванням, користувачами, видачами та відгуками."
  version: 1.0.0
servers:
- url: https://virtserver.swaggerhub.com/org-98e/Lab5/1.0.0
  description: SwaggerHub API Auto Mocking
- url: http://localhost:8000/api/v1
  description: Локальний сервер
tags:
- name: Books
  description: Операції з книгами
- name: Users
  description: "Реєстрація, авторизація та профіль користувача"
- name: Borrowings
  description: Видача та повернення книг
- name: Reviews
  description: Відгуки на книги
paths:
  /books:
    get:
      tags:
      - Books
      summary: Отримати список книг
      description: Повертає список книг з підтримкою пошуку та пагінації
      operationId: getAllBooks
      parameters:
      - name: search
        in: query
        description: "Пошук за назвою, автором або ISBN"
        required: false
        schema:
          type: string
      - name: page
        in: query
        required: false
        schema:
          type: integer
          default: 1
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 20
      responses:
        "200":
          description: Успішне отримання списку книг
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Book"
        "400":
          description: Невірні параметри запиту
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags:
      - Books
      summary: Додати нову книгу
      description: Додає нову книгу до каталогу (тільки для адміністратора)
      operationId: createBook
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookCreate"
        required: true
      responses:
        "201":
          description: Книга успішно створена
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "400":
          description: Невірні дані
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Доступ заборонено
      security:
      - bearerAuth: []
  /books/{bookId}:
    get:
      tags:
      - Books
      summary: Отримати деталі книги
      operationId: getBookById
      parameters:
      - name: bookId
        in: path
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Детальна інформація про книгу
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "404":
          description: Книгу не знайдено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags:
      - Books
      summary: Оновити інформацію про книгу
      operationId: updateBook
      parameters:
      - name: bookId
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookCreate"
        required: true
      responses:
        "200":
          description: Книга успішно оновлена
        "403":
          description: Доступ заборонено
        "404":
          description: Книгу не знайдено
      security:
      - bearerAuth: []
    delete:
      tags:
      - Books
      summary: Видалити книгу
      operationId: deleteBook
      parameters:
      - name: bookId
        in: path
        required: true
        schema:
          type: integer
      responses:
        "204":
          description: Книга успішно видалена
        "403":
          description: Доступ заборонено
        "404":
          description: Книгу не знайдено
      security:
      - bearerAuth: []
  /users/register:
    post:
      tags:
      - Users
      summary: Реєстрація нового користувача
      operationId: registerUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreate"
        required: true
      responses:
        "201":
          description: Користувач успішно зареєстрований
        "400":
          description: Помилка валідації даних
  /users/login:
    post:
      tags:
      - Users
      summary: Авторизація користувача
      operationId: loginUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserLogin"
        required: true
      responses:
        "200":
          description: Успішна авторизація
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200"
  /users/me:
    get:
      tags:
      - Users
      summary: Отримати профіль поточного користувача
      operationId: getCurrentUser
      responses:
        "200":
          description: Профіль користувача
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
      security:
      - bearerAuth: []
  /borrowings:
    get:
      tags:
      - Borrowings
      summary: Отримати список всіх видач (для адміністратора)
      operationId: getAllBorrowings
      responses:
        "200":
          description: Список видач
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Borrowing"
      security:
      - bearerAuth: []
    post:
      tags:
      - Borrowings
      summary: Взяти книгу
      operationId: createBorrowing
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/borrowings_body"
        required: true
      responses:
        "201":
          description: Книга успішно взята
        "400":
          description: Книга недоступна або перевищено ліміт
      security:
      - bearerAuth: []
  /borrowings/{borrowingId}/return:
    patch:
      tags:
      - Borrowings
      summary: Повернути книгу
      operationId: returnBook
      parameters:
      - name: borrowingId
        in: path
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Книга успішно повернена
        "400":
          description: Помилка (книга вже повернута або доступ заборонено)
      security:
      - bearerAuth: []
  /books/{bookId}/reviews:
    get:
      tags:
      - Reviews
      summary: Отримати всі відгуки до книги
      operationId: getBookReviews
      parameters:
      - name: bookId
        in: path
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Список відгуків
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      tags:
      - Reviews
      summary: Додати відгук до книги
      operationId: createReview
      parameters:
      - name: bookId
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewCreate"
        required: true
      responses:
        "201":
          description: Відгук успішно додано
        "400":
          description: Невірні дані
      security:
      - bearerAuth: []
components:
  schemas:
    Book:
      required:
      - author
      - id
      - isbn
      - title
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 42
        title:
          type: string
          example: "1984"
        author:
          type: string
          example: Джордж Орвелл
        isbn:
          type: string
          example: 978-0451524935
        description:
          type: string
          example: Антиутопія про тоталітарне суспільство
        available:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
    BookCreate:
      required:
      - author
      - isbn
      - title
      type: object
      properties:
        title:
          type: string
          example: "1984"
        author:
          type: string
          example: Джордж Орвелл
        isbn:
          type: string
          example: 978-0451524935
        description:
          type: string
          example: Антиутопія про тоталітарне суспільство
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 15
        email:
          type: string
          example: student@example.com
        first_name:
          type: string
          example: Дмитро
        last_name:
          type: string
          example: Райчев
        role:
          type: string
          example: USER
          enum:
          - USER
          - ADMIN
        created_at:
          type: string
          format: date-time
    UserCreate:
      required:
      - email
      - password
      type: object
      properties:
        email:
          type: string
          example: student@example.com
        password:
          type: string
          example: StrongPass123!
        first_name:
          type: string
          example: Дмитро
        last_name:
          type: string
          example: Райчев
    UserLogin:
      required:
      - email
      - password
      type: object
      properties:
        email:
          type: string
          example: student@example.com
        password:
          type: string
          example: StrongPass123!
    Borrowing:
      type: object
      properties:
        id:
          type: integer
          format: int64
        book_id:
          type: integer
          example: 42
        user_id:
          type: integer
          example: 15
        borrow_date:
          type: string
          format: date-time
        due_date:
          type: string
          format: date-time
        return_date:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          example: ACTIVE
          enum:
          - ACTIVE
          - RETURNED
          - OVERDUE
    Review:
      type: object
      properties:
        id:
          type: integer
          format: int64
        book_id:
          type: integer
          example: 42
        user_id:
          type: integer
          example: 15
        rating:
          maximum: 5
          minimum: 1
          type: integer
          example: 5
        comment:
          type: string
          example: "Дуже сильна книга, рекомендую!"
        created_at:
          type: string
          format: date-time
    ReviewCreate:
      required:
      - comment
      - rating
      type: object
      properties:
        rating:
          maximum: 5
          minimum: 1
          type: integer
          example: 5
        comment:
          type: string
          example: "Дуже сильна книга, рекомендую!"
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Bad Request
        message:
          type: string
          example: ISBN вже існує в системі
        status_code:
          type: integer
          example: 400
    inline_response_200:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
    borrowings_body:
      type: object
      properties:
        book_id:
          type: integer
          example: 42
  securitySchemes:
    bearerAuth:
      type: http
      description: JWT токен авторизації. Отримати можна після успішного запиту на /users/login
      scheme: bearer
      bearerFormat: JWT
